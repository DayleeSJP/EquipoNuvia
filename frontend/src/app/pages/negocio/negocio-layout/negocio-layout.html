<section class="h-screen bg-[#F6F7F9] text-[#071326] flex overflow-hidden">

    <!-- BARRA LATERAL -->
    <aside class="w-[48px] bg-[#070B10] flex flex-col items-center shrink-0">

        <!-- LOGO PEQUEÑO -->
        <div class="mt-4 mb-8 w-8 h-8 flex items-center justify-center rounded-xl text-white font-bold text-sm">
            N
        </div>

        <!-- NAVEGACIÓN -->
        <nav class="flex flex-1 flex-col items-center gap-5">

            <a routerLink="/negocio/dashboard" routerLinkActive="bg-[#7357F4] text-white"
                [routerLinkActiveOptions]="{ exact: true }"
                class="w-8 h-8 rounded-lg text-[#7584A3] hover:bg-[#161B22] hover:text-white flex items-center justify-center text-[15px] transition"
                title="Dashboard">
                ⌂
            </a>

            <a routerLink="/negocio/calendario" routerLinkActive="bg-[#7357F4] text-white"
                class="w-8 h-8 rounded-lg text-[#7584A3] hover:bg-[#161B22] hover:text-white flex items-center justify-center text-[15px] transition"
                title="Calendario">
                📅
            </a>

            <a routerLink="/negocio/personalizacion" routerLinkActive="bg-[#7357F4] text-white"
                class="w-8 h-8 rounded-lg text-[#7584A3] hover:bg-[#161B22] hover:text-white flex items-center justify-center text-[15px] transition"
                title="Personalización">
                ◇
            </a>

            <a routerLink="/negocio/servicios" routerLinkActive="bg-[#7357F4] text-white"
                class="w-8 h-8 rounded-lg text-[#7584A3] hover:bg-[#161B22] hover:text-white flex items-center justify-center text-[15px] transition"
                title="Servicios">
                ☺
            </a>

            <a routerLink="/negocio/trabajadores" routerLinkActive="bg-[#7357F4] text-white"
                class="w-8 h-8 rounded-lg text-[#7584A3] hover:bg-[#161B22] hover:text-white flex items-center justify-center text-[15px] transition"
                title="Trabajadores">
                👥
            </a>

            <a routerLink="/negocio/reportes" routerLinkActive="bg-[#7357F4] text-white"
                class="w-8 h-8 rounded-lg text-[#7584A3] hover:bg-[#161B22] hover:text-white flex items-center justify-center text-[15px] transition"
                title="Reportes">
                ↗
            </a>

        </nav>

        <!-- ABAJO -->
        <div class="mb-5 flex flex-col items-center gap-5">

            <a routerLink="/negocio/configuracion" routerLinkActive="bg-[#7357F4] text-white"
                class="w-8 h-8 rounded-lg text-[#7584A3] hover:bg-[#161B22] hover:text-white flex items-center justify-center text-[15px] transition"
                title="Configuración">
                ⚙
            </a>


        </div>

    </aside>

    <!-- CONTENIDO GENERAL -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

        <!-- HEADER -->
        <header class="h-[44px] bg-white border-b border-[#E5E8EE] px-5 flex items-center justify-between shrink-0">

            <a routerLink="/" class="text-[15px] font-extrabold tracking-[-0.02em] hover:opacity-70 transition">
                Nuvia
            </a>

            <div class="flex items-center gap-4">

                <button class="hidden md:block text-[14px] text-[#0C1B34]">
                    🔍
                </button>

                <button class="hidden md:block text-[14px] text-[#0C1B34]">
                    📊
                </button>

                <button class="hidden md:block text-[14px] text-[#0C1B34]">
                    🔔
                </button>

            <div
            class="w-7 h-7 rounded-full bg-[#E3DCFF] text-[#5036C9] text-[10px] font-bold flex items-center justify-center">
            {{ inicialNegocio() }}
            </div>

            </div>

        </header>

        <!-- AQUÍ SE CARGA DASHBOARD / CALENDARIO / PERSONALIZACIÓN -->
        <div class="flex-1 min-h-0 overflow-y-auto overflow-x-hidden">
            <router-outlet></router-outlet>
        </div>

    </div>

</section>
